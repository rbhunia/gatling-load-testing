gatling {
  http {
    requestTimeout = 30000
    pooledConnectionIdleTimeout = 60000
    maxConnectionsPerHost = 50                    // Increased from 10 for better concurrency
    connectionTimeout = 10000                     // Added explicit connection timeout
    enableHttp2 = true                           // Enable HTTP/2 for better performance
    shareConnections = true                      // Share connections across virtual users
  }

  data {
    writers = [console, file]
    console {
      light = true                               // Optimized console output
    }
    file {
      bufferSize = 16384                        // Increased buffer size for better I/O
    }
  }

  charting {
    indicators {
      percentile1 = 50
      percentile2 = 75
      percentile3 = 95
      percentile4 = 99
    }
    maxPlotsPerSeries = 1000                    // Limit plots for memory efficiency
  }

  core {
    outputDirectoryBaseName = "gatling-results"
    runDescription = "MX Message Load Test"
    encoding = "utf-8"
    simulationClass = ""
    elFileBodiesCacheMaxCapacity = 200          // Cache optimization
    rawFileBodiesCacheMaxCapacity = 200
    rawFileBodiesInMemoryMaxSize = 1000
    pebbleFileBodiesCacheMaxCapacity = 200
  }
}