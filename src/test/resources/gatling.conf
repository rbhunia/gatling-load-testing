gatling {
  http {
    requestTimeout = 30000
    pooledConnectionIdleTimeout = 60000
    maxConnectionsPerHost = 10
  }

  data {
    writers = [console, file]
    console {
      light = false
    }
    file {
      bufferSize = 8192
    }
  }

  charting {
    indicators {
      percentile1 = 50
      percentile2 = 75
      percentile3 = 95
      percentile4 = 99
    }
  }
}